  secretKey: ragnarok-breaker/dockerhub

worker:
  image:
    tag: git-a5db7f0fa8877084f6c992b391e9d2a7b037c3c0

v8Gateway:
  image:
    tag: git-a5db7f0fa8877084f6c992b391e9d2a7b037c3c0

logStream:
  image:
    tag: git-a5db7f0fa8877084f6c992b391e9d2a7b037c3c0

yggRedeem:
  image:
    tag: git-a5db7f0fa8877084f6c992b391e9d2a7b037c3c0
  httpRoute:
    enabled: true
    hostnames:
      - ygg-redeem-staging.9c.gg

yggQuestWorker:
  image:
    tag: git-a5db7f0fa8877084f6c992b391e9d2a7b037c3c0

# bq-analytics runs in production only; disabled here, tag pinned for bulk bump.
bqAnalyticsWorker:
  enabled: false
  image:
    tag: git-a5db7f0fa8877084f6c992b391e9d2a7b037c3c0

# 메일 지급 워커 — staging-web3 도 web2 와 동일하게 활성화(그간 web2 만 있었음).
# tag = staging 검증 이미지(web2 와 동일). 발송 계정: 공유 워커/게이트웨이 계정 재사용
#   (MAIL_SENDER_V8_* 없으면 V8_ACCOUNT/_VERSE/_AUTH/_ENV 폴백, 신규 SM 키 불필요).
# ⚠ httproute 호스트 rb-mail-send-staging-web3.9c.gg 는 DNS/firewall 등록 필요.
mailSendWorker:
  enabled: true
  image:
    tag: git-a5db7f0fa8877084f6c992b391e9d2a7b037c3c0
  httpRoute:
    enabled: true
    hostnames:
      - rb-mail-send-staging-web3.9c.gg

# 리그 보상 메일 워커 — staging-web3 검증용 활성화. 위 mailSendWorker(web3)를 내부 DNS 호출.
# verseLabel 은 web2 와 달라야 함(jobId 충돌 방지).
# ⚠ sync 전: AWS SM ragnarok-breaker/staging-web3 에 R2_PUBLIC_BASE·CDN_ENV 확인,
#   계정 worker.records 권한.
leagueRewardWorker:
  enabled: true
  image:
    tag: git-a5db7f0fa8877084f6c992b391e9d2a7b037c3c0
  config:
    verseLabel: staging-w3

# Playfull CPE 아웃바운드 워커 — staging 검증용 활성화.
# 파이프라인: 게임서버가 검증된 stage_clear 시 playfull_event 로그 emit
#   → log-stream 이 playfull-event 큐로 라우팅(LOG_STREAM_ENABLE_PLAYFULL=true 일 때만)
#   → 이 워커가 소비해 HMAC 서명 후 Playfull Events API 로 POST.
#
# ⚠ sync 전 AWS SM ragnarok-breaker/staging-web3 에 아래 키 추가 필요:
#     PLAYFULL_CLIENT_ID / PLAYFULL_CLIENT_SECRET / PLAYFULL_GAME_ID
#     PLAYFULL_DRY_RUN=true            (실 전송 없이 서명·바디만 로그. 검증 후 false)
#     LOG_STREAM_ENABLE_PLAYFULL=true  (log-stream 이 큐로 라우팅. 미설정 시 emit drop)
#
# ⚠ 순서: 워커가 먼저 뜬 뒤 LOG_STREAM_ENABLE_PLAYFULL 을 켠다.
#   반대로 하면 컨슈머 없는 큐에 잡이 적체된다.
playfullWorker:
  enabled: true
  image:
    tag: git-b7009db27f03ffb21864dd72b0ca4a6a67fd74e5

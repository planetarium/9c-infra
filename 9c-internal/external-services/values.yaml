clusterName: 9c-internal
provider: RKE2

externalSecret:
  enabled: true
  provider: AWS
  prefix: "9c-internal-v2/external-services"

gateway:
  enabled: true
  services:
  - name: seasonpass-api-service
    hostnames:
    - seasonpass-internal.9c.gg
  - name: iap-backoffice
    hostnames:
    - iap-internal-backoffice.9c.gg
  - name: iap-api
    hostnames:
    - iap-internal-api.9c.gg

volumeReclaimPolicy: "Retain"

seasonpass:
  enabled: true
  image:
    tag: "git-3c29100ff62f588ecf14dd50e48527c55bb02fe3"

  api:
    enabled: true
    stage: "internal"
    resources:
      limits:
        cpu: 0.5
        memory: 1Gi

    # /ping is a sync FastAPI route that runs in the same threadpool as
    # request handlers, so it queues when the threadpool is exhausted by
    # blocked GQL calls — exactly the hang signature we want to detect.
    livenessProbe:
      httpGet:
        path: /ping
        port: 8000
      initialDelaySeconds: 30
      periodSeconds: 60
      timeoutSeconds: 5
      failureThreshold: 3
    readinessProbe:
      httpGet:
        path: /ping
        port: 8000
      initialDelaySeconds: 5
      periodSeconds: 10
      timeoutSeconds: 3
      failureThreshold: 3

  worker:
    enabled: true
    serviceAccount:
      roleArn: "arn:aws:iam::319679068466:role/9c-internal-v2-seasonpass-worker"
    flower:
      enabled: true
    resources:
      limits:
        cpu: 0.5
        memory: 1Gi

  tracker:
    enabled: true

    odin:
      planetId: "0x100000000000"
    heimdall:
      planetId: "0x100000000001"
    thor:
      planetId: "0x100000000003"

    resources:
      limits:
        cpu: 0.5
        memory: 1Gi

iap:
  enabled: true
  backoffice:
    enabled: false
    image:
      tag: "git-9321af4246edb846db69a2c43df63cfbad5cfa16"


  api:
    enabled: true
    stage: "internal"
    image:
      tag: "git-9321af4246edb846db69a2c43df63cfbad5cfa16"
    serviceAccount:
      roleArn: "arn:aws:iam::319679068466:role/9c-internal-v2-seasonpass-worker"

  worker:
    enabled: true
    stage: "internal"
    image:
      tag: "git-9321af4246edb846db69a2c43df63cfbad5cfa16"
    serviceAccount:
      roleArn: "arn:aws:iam::319679068466:role/9c-internal-v2-iap-worker"

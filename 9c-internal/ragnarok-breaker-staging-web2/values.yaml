  secretKey: ragnarok-breaker/dockerhub

worker:
  image:
    tag: git-4d8d9da39b0515d55f0a61136175d59a8f44224d

v8Gateway:
  image:
    tag: git-4d8d9da39b0515d55f0a61136175d59a8f44224d

logStream:
  image:
    tag: git-4d8d9da39b0515d55f0a61136175d59a8f44224d

# 메일 지급 워커 — staging 검증용 활성화. tag = petpop build:mail-send-worker 산출 이미지.
# 발송 계정: 공유 워커/게이트웨이 계정을 재사용(admin.ts mailSendWorker role 등록됨). 워커가
#   MAIL_SENDER_V8_* 없으면 기존 V8_ACCOUNT/_VERSE/_AUTH/_ENV 로 폴백하므로 신규 SM 키 불필요.
# 선택: Slack 알림 원하면 AWS SM ragnarok-breaker/staging-web2 에 MAIL_SEND_SLACK_WEBHOOK 추가
#   (미설정 시 알림 skip). MAIL_SEND_LIMITER_MAX/_MS 도 선택(기본 1건/1000ms).
mailSendWorker:
  enabled: true
  image:
    tag: git-4d8d9da39b0515d55f0a61136175d59a8f44224d
  httpRoute:
    enabled: true
    hostnames:
      - rb-mail-send-staging-web2.9c.gg

# 리그 보상 메일 워커 — staging 검증용 활성화. 같은 네임스페이스 mailSendWorker(위)를
# 내부 DNS 로 호출한다. verseLabel 은 jobId suffix 로 web2/web3 간 고유해야 함.
# ⚠ sync 전: AWS SM ragnarok-breaker/staging-web2 에 R2_PUBLIC_BASE·CDN_ENV 존재 확인,
#   발송 계정에 worker.records 권한 필요.
leagueRewardWorker:
  enabled: true
  image:
    tag: git-4d8d9da39b0515d55f0a61136175d59a8f44224d
  config:
    verseLabel: staging-w2

# Playfull CPE 아웃바운드 워커 — staging 검증용 활성화.
# 파이프라인: 게임서버가 검증된 stage_clear 시 playfull_event 로그 emit
#   → log-stream 이 playfull-event 큐로 라우팅(LOG_STREAM_ENABLE_PLAYFULL=true 일 때만)
#   → 이 워커가 소비해 HMAC 서명 후 Playfull Events API 로 POST.
#
# ⚠ sync 전 AWS SM ragnarok-breaker/staging-web2 에 아래 키 추가 필요:
#     PLAYFULL_CLIENT_ID / PLAYFULL_CLIENT_SECRET / PLAYFULL_GAME_ID
#     PLAYFULL_DRY_RUN=true            (실 전송 없이 서명·바디만 로그. 검증 후 false)
#     LOG_STREAM_ENABLE_PLAYFULL=true  (log-stream 이 큐로 라우팅. 미설정 시 emit drop)
#
# ⚠ 순서: 워커가 먼저 뜬 뒤 LOG_STREAM_ENABLE_PLAYFULL 을 켠다.
#   반대로 하면 컨슈머 없는 큐에 잡이 적체된다.
playfullWorker:
  enabled: true
  image:
    tag: git-4d8d9da39b0515d55f0a61136175d59a8f44224d

# web2→web3 마이그레이션 브리지 — web2 verse 네임스페이스에 배치(크로스-verse 싱글톤).
# ⚠ 반드시 이 한 네임스페이스에서만 enable — staging-web3 에는 절대 켜지 말 것
#   (두 인스턴스가 같은 web2 큐를 폴링. claim CAS + (P,A) 멱등이라 중복 크레딧은 안 나지만 낭비).
# ⚠ image.tag 는 petpop main MR 머지 후 CI build:migration-bridge 산출
#   ragnarok-breaker-migration-bridge:git-<sha> 로 핀(현재 develop 은 플레이스홀더).
# ⚠ AWS SM ragnarok-breaker/staging-web2 에 web2·web3 두 verse 자격증명 모두 추가:
#   MIGRATION_BRIDGE_WEB2_V8_{ACCOUNT,VERSE,ENV,AUTH,REMOTE_URL}
#   MIGRATION_BRIDGE_WEB3_V8_{ACCOUNT,VERSE,ENV,AUTH,REMOTE_URL}
#   (파드 위치와 무관하게 web3 는 게이트웨이 URL+bearer 로 도달하므로 web3 자격증명도 여기 필요)
migrationBridge:
  enabled: true
  image:
    tag: develop

apiVersion: external-secrets.io/v1beta1
kind: SecretStore
metadata:
  name: monitoring-secretstore-us-east-2
  namespace: monitoring
spec:
  provider:
    aws:
      service: SecretsManager
      region: "us-east-2"
---
apiVersion: external-secrets.io/v1beta1
kind: ExternalSecret
metadata:
  name: slack
  namespace: monitoring
spec:
  refreshInterval: 1m
  secretStoreRef:
    kind: SecretStore
    name: monitoring-secretstore-us-east-2
  target:
    name: slack
  dataFrom:
    - extract:
        key: 9c-main-v2/slack

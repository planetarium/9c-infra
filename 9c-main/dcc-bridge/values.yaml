externalSecretKey: 9c-main-v2/dcc-bridge

serviceAccount:
  # Existing role from EC2; trust policy was extended to allow RKE2 OIDC,
  # so the same role is reused for k8s pods until full cutover.
  roleArn: arn:aws:iam::319679068466:role/dcc-bridge-kms-user

api:
  # Phase A: bring up api/ first against existing RDS; bridge stays on EC2.
  enabled: true
  image:
    repository: planetariumhq/dcc-bridge
    # Bumped by hand following the petpop pattern when a new SHA is published
    # by docker.yml on dcc-bridge develop/main.
    tag: api-dc8edccaa0013da82169daf6224ad61194d2030c
  replicas: 1
  hostnames: []  # Filled in only after Phase A verification (e.g., bridge-api.dccnft.com)
  resources:
    requests:
      cpu: 100m
      memory: 256Mi
    limits:
      cpu: 500m
      memory: 1Gi
  nodeSelector:
    node.kubernetes.io/type: general

  cronStatus:
    # Cutover: EventBridge `dcc-bridge-lambda-event-rule` was disabled, k8s
    # CronJob now takes over the per-minute /status check.
    enabled: true
    schedule: "* * * * *"
  cronReport:
    # Cutover: same — EventBridge `dcc-bridge-lambda-report-event-rule` was
    # disabled, k8s CronJob takes over the daily report.
    enabled: true
    schedule: "30 1 * * *"

bridge:
  # Cutover: EC2 worker stopped, k8s bridge worker takes over Ethereum burn
  # event polling and 9c transaction signing. Replicas hard-coded to 1 in
  # the chart with strategy=Recreate to prevent double-processing.
  enabled: true
  image:
    repository: planetariumhq/dcc-bridge
    tag: bridge-dc8edccaa0013da82169daf6224ad61194d2030c
  resources:
    requests:
      cpu: 100m
      memory: 256Mi
    limits:
      cpu: 500m
      memory: 1Gi
  nodeSelector:
    node.kubernetes.io/type: general

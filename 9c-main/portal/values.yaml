portalService:
  name: portal
  hostnames:
    - "nine-chronicles.com"
    - "www.nine-chronicles.com"
  replicaCount: 2
  service:
    type: ClusterIP
    port: 3000
  nodeSelector:
    node.kubernetes.io/type: baremetal
  image:
    repository: planetariumhq/9c-portal
    tag: main-8553220b1bfd37bd2040bb92b0f140cb39ed92e6
    pullPolicy: Always
  externalSecret:
    enabled: true
    provider: AWS
    prefix: "9c-main-v2/portal"
  env:
    NODE_ENV: production
    BASE_URL: "https://nine-chronicles.com"
    NEXT_PUBLIC_STATUS_SERVER_URL: "https://portal-status.nine-chronicles.com"
    S3_BANNER_BUCKET: "9c-portal-banner"
    BANNER_CLOUD_FRONT_DOMAIN: "https://d20llolvuaz1gj.cloudfront.net/"
    QA_ENABLED: false
    NEXT_PUBLIC_MAINNET_ENV: production
    NEXT_PUBLIC_PLANETARY_ENDPOINT: "https://planets.nine-chronicles.com/planets/"
backofficeService:
  name: backoffice
  hostname: "portal.planetarium.team"
  replicaCount: 1
  service:
    type: ClusterIP
    port: 3001
  nodeSelector:
    node.kubernetes.io/type: baremetal
  image:
    repository: planetariumhq/9c-portal-backoffice
    tag: main-a3e09d3bc37d84b19e2d078ddec5e7ebe213c068
    pullPolicy: Always
  externalSecret:
    enabled: true
    provider: AWS
    prefix: "9c-main-v2/backoffice"
  cronjobs:
    - name: withdrawal
      schedule: "*/2 * * * *"
      endpoint: "https://portal.planetarium.team/api/scheduler/withdrawal"
      tokenEnvName: "SCHEDULER_API_KEY"
    - name: withdrawal-status
      schedule: "*/15 * * * *"
      endpoint: "https://portal.planetarium.team/api/scheduler/transaction"
      tokenEnvName: "SCHEDULER_API_KEY"
    # 글로리 리딤 날짜별 통계 → Slack #9c-metrics (read-only 집계, 돈 액션 없음). 매일 10:00 KST(01:00 UTC).
    # ⚠️ 엔드포인트(9c-portal PR #1264)가 prod backoffice에 배포된 뒤 유효. 그 전엔 404(무해).
    - name: redeem-stats
      schedule: "0 1 * * *"
      endpoint: "https://portal.planetarium.team/api/scheduler/redeem-stats"
      tokenEnvName: "SCHEDULER_API_KEY"

# Anti-cheat → Slack alert worker (prod only). SLACK_VIOLATION_WEBHOOK_URL is
# read from the ragnarok-breaker-env SecretsManager entry for this namespace.
anticheatAlertWorker:
  enabled: true
  image:
    tag: git-35a74b3660456b21eb29b1342bc3d835070b815b

# 메일 지급 워커 — prod web3 활성화. tag = petpop build:mail-send-worker 산출 이미지
#   (env-agnostic, SM 으로 env 주입 → staging 검증 이미지 재사용).
# 호스트명은 /mail-send 스킬의 mailSendWorkerUrlOf('prod','web3') 파생값과 1:1 일치해야 함.
# 발송 계정: MAIL_SENDER_V8_* 미설정 시 ragnarok-breaker/prod-web3 의 V8_ACCOUNT/_VERSE/_AUTH/_ENV
#   로 폴백. 해당 계정이 prod verse 에서 mailSendWorker role 로 등록돼 있어야 실제 발송 가능.
# 선택: Slack 알림은 AWS SM 에 MAIL_SEND_SLACK_WEBHOOK 추가 시 활성(미설정 시 skip).
mailSendWorker:
  enabled: true
  image:
    tag: git-a5db7f0fa8877084f6c992b391e9d2a7b037c3c0
  httpRoute:
    enabled: true
    hostnames:
      - rb-mail-send-prod-web3.9c.gg

# 리그 보상 메일 워커 — prod 실지급. 같은 네임스페이스 mailSendWorker(위)를 내부 DNS 호출.
# ⚠ ArgoCD sync(=워커 기동) 전 필수:
#   (1) 이 verse Redis 의 SET `league-reward:paid` 에 이미 수동 지급된 리그 시즌 id 를 전부
#       SADD. 구 manual 도구(sendUserMailBatch)는 서버 receipt 를 안 남겨 결정론 jobId dedup 이
#       안 걸리므로, 미시딩 시 7일 lookback 안의 수동 지급 시즌을 재지급(이중지급)한다.
#   (2) AWS SM ragnarok-breaker/prod-web3 에 R2_PUBLIC_BASE·CDN_ENV 존재 확인.
#   발송계정(0x3c33)은 worker.records·user.read·mail.send 보유(확인됨).
leagueRewardWorker:
  enabled: true
  image:
    tag: git-c3da22f0afb86d512a15769b52ad1c5464b76c1d
  config:
    verseLabel: prod-w3

# Single shared ingest gateway for all payment envs (no app_env split) —
# the only namespace that hosts it. The bulk `bump-image rb <hash>` keeps this
# in sync (optional key: bumped here where present, skipped in overlays that
# lack it); a targeted `bump-image rb bq-ingest-gateway <hash>` also works.
bqIngestGateway:
  enabled: true
  image:
    tag: git-35a74b3660456b21eb29b1342bc3d835070b815b
  httpRoute:
    enabled: true
    hostnames:
      - bq-ingest.9c.gg

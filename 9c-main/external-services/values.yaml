clusterName: 9c-main
provider: RKE2

externalSecret:
  enabled: true
  provider: AWS
  prefix: "9c-main-v2/external-services"

gateway:
  enabled: true
  services:
  - name: seasonpass-api-service
    hostname: seasonpass.9c.gg
  - name: iap-backoffice
    hostnames:
    - iap-backoffice.9c.gg
  - name: iap-api
    hostnames:
    - iap-api.9c.gg
  - name: ncboard
    hostnames:
    - ncboard.9c.gg
    - 9c-board.nine-chronicles.dev

volumeReclaimPolicy: "Retain"

seasonpass:
  enabled: true
  image:
    # SeasonPass #311 (invalid-claim -> count) — stacked on #310 -> #309 -> #308
    # -> #306, so this bump ships the whole stack on top of live bfbe0b2:
    #   485b172  raise DB pool 30 -> 60 (absorb connection holds)        [#306]
    #   887fe57  API: call cleared-stage RPC outside the DB transaction  [#308]
    #   52e16aa  tracker: run tx-tracker GQL outside the DB transaction  [#309]
    #   bfbe0b2  API: resolve level before mutating target in backfill   [#310]
    #   63c5735  API: /invalid-claim returns a count, not 503-if-any      [#311]
    # #306/#308/#309/#310 removed the lock convoy that exhausted the pool and
    # tripped the block-status/invalid-claim monitors. #311 stops a SINGLE
    # transient stuck claim (e.g. one heimdall tx that settled in ~13min) from
    # paging: /invalid-claim now returns the stuck-claim count (HTTP 200) instead
    # of 503-if-any, like IAP /purchase/invalid-receipt-count.
    #
    # !!! REQUIRED with this deploy: reconfigure the Assertible "Test Invalid
    # Claim" check to fail when the returned number exceeds a threshold (start
    # >=3). Until then the check always sees 200 and never alarms.
    #
    # No migration coupling: the partial index (#307) is already applied live and
    # the code works with or without it.
    tag: "git-63c57359136a7da0649ba1634d5ba4c01082f84d"

  api:
    enabled: true
    stage: "mainnet"
    nodeSelector:
      node.kubernetes.io/node-index: "2"
      node.kubernetes.io/provisioner: "cloudv"
      node.kubernetes.io/type: "general"

    # Bound memory so a runaway leak (e.g. NineChronicles.SeasonPass#303)
    # is OOMKilled+auto-restarted instead of degrading until manual fix.
    resources:
      requests:
        cpu: 100m
        memory: 256Mi
      limits:
        cpu: "1"
        memory: 1Gi

    # /ping is a sync FastAPI route that runs in the same threadpool as
    # request handlers, so it queues when the threadpool is exhausted by
    # blocked GQL calls — exactly the hang signature we want to detect.
    livenessProbe:
      httpGet:
        path: /ping
        port: 8000
      initialDelaySeconds: 30
      periodSeconds: 60
      timeoutSeconds: 5
      failureThreshold: 3
    readinessProbe:
      httpGet:
        path: /ping
        port: 8000
      initialDelaySeconds: 5
      periodSeconds: 10
      timeoutSeconds: 3
      failureThreshold: 3

  worker:
    enabled: true
    serviceAccount:
      roleArn: "arn:aws:iam::319679068466:role/9c-main-v2-seasonpass-worker"
    flower:
      enabled: true

    nodeSelector:
      node.kubernetes.io/node-index: "2"
      node.kubernetes.io/provisioner: "cloudv"
      node.kubernetes.io/type: "general"


  tracker:
    enabled: true

    nodeSelector:
      node.kubernetes.io/node-index: "2"
      node.kubernetes.io/provisioner: "cloudv"
      node.kubernetes.io/type: "general"

    odin:
      planetId: "0x000000000000"
    heimdall:
      planetId: "0x000000000001"
    thor:
      planetId: "0x000000000003"

    resources:
      limits:
        cpu: 0.25
        memory: 1Gi

backoffice:
  enabled: true

  image:
    pullPolicy: Always
    tag: "git-f6382618f1c2e72a8e88fbbc5c61d8bf3f5574f9"


iap:
  enabled: true
  backoffice:
    enabled: false
    image:
      tag: "git-9321af4246edb846db69a2c43df63cfbad5cfa16"

  api:
    enabled: true
    stage: "mainnet"
    image:
      tag: "git-9321af4246edb846db69a2c43df63cfbad5cfa16"
    serviceAccount:
      roleArn: "arn:aws:iam::319679068466:role/9c-main-v2-iap-worker"

    nodeSelector:
      node.kubernetes.io/node-index: "2"
      node.kubernetes.io/provisioner: "cloudv"
      node.kubernetes.io/type: "general"

  worker:
    enabled: true
    stage: "mainnet"
    image:
      tag: "git-9321af4246edb846db69a2c43df63cfbad5cfa16"
    serviceAccount:
      roleArn: "arn:aws:iam::319679068466:role/9c-main-v2-iap-worker"

    nodeSelector:
      node.kubernetes.io/node-index: "2"
      node.kubernetes.io/provisioner: "cloudv"
      node.kubernetes.io/type: "general"

ncboard:
  enabled: true
  image:
    tag: git-d876a80f84f1a6bdf01ef470282e710467954479

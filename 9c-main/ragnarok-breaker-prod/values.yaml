externalSecretKey: ragnarok-breaker/prod

imagePullSecret:
  secretKey: ragnarok-breaker/dockerhub

# 이 오버레이(ragnarok-breaker-prod, ns ragnarok-breaker-prod)는 분석 스냅샷 CronJob 전용.
# 다른 RB 워크로드(worker·v8-gateway·ygg·log-stream·bq-analytics·anticheat)는
# ragnarok-breaker-prod-web2 / -prod-web3 오버레이가 담당하므로 여기선 전부 비활성.
workers:
  stageValidation:
    enabled: false
  leagueValidation:
    enabled: false
v8Gateway:
  enabled: false
yggRedeem:
  enabled: false
logStream:
  enabled: false
yggQuestWorker:
  enabled: false
bqAnalyticsWorker:
  enabled: false
anticheatAlertWorker:
  enabled: false

# Analytics snapshot CronJob — 12h 전역 싱글톤. 이 오버레이에서만 enable.
# tag 는 첫 CI 빌드(ragnarok-breaker-analytics-worker) 완료 후 git-<sha> 로 핀.
analyticsWorker:
  enabled: true
  image:
    tag: git-d3c0c312d714c9097896f55ef419e4a509112602

# pt6 odin overlay: only the snapshot CronJob runs here.
# Inherits image tags, appProtocolVersion, peerStrings, etc. from
# /9c-main/network/{general,odin}.yaml via multiplanetary sharedValueFiles.

gateway:
  enabled: false

# pt6 is a standalone single-node cluster without MetalLB installed. Skip
# emitting the per-network IPAddressPool.
metallb:
  enabled: false

# pt6 does not provision the remote-headless / data-provider PVCs that
# 9c-main lists under global.storage.
global:
  storage: []
  resetSnapshot: false
  rollbackSnapshot: false

  # Override the inherited single-seed peer list (lists are replaced, not merged).
  # pt6 sits in the office/colo network and can only reach the colo seed and the
  # colo MetalLB IPs; the planetarium.dev/EKS seeds don't even resolve from here.
  # With just seed-1, a transient drop on that single connection halts preload
  # with "There are no appropriate peers for preloading", which is how the
  # snapshot store fell ~24 days behind. Add validator-5 (the single odin
  # validator -> stable swarm key, always at tip) as a second peer for
  # resilience. It is reachable from pt6 at its colo MetalLB IP on the swarm
  # port (115.68.194.100:31234); there is no DNS for that swarm endpoint, so the
  # raw IP is used (MetalLB IP has been stable for 300d+).
  peerStrings:
  - "027bd36895d68681290e570692ad3736750ceaab37be402442ffb203967f98f7b6,odin-tcp-seed-1.nine-chronicles.com,31234"
  - "03a0f95711564d10c60ba1889d068c26cb8e5fcd5211d5aeb8810e133d629aa306,115.68.194.100,31234"

# Disable components that pt6 does not run.
seed:
  count: 0

validator:
  count: 0

remoteHeadless:
  count: 0

volumePreloader:
  count: 0

dataProvider:
  enabled: false

marketService:
  enabled: false

arenaService:
  enabled: false
  backoffice:
    enabled: false

iap:
  backoffice:
    enabled: false

seasonpass:
  enabled: false

mimir:
  enabled: false
  gql:
    enabled: false
  diffWorker:
    enabled: false
  blockWorker:
    enabled: false

stateMigrationService:
  enabled: false

bridgeService:
  enabled: false

bridgeServiceApi:
  enabled: false

bridge:
  enabled: false

worldBoss:
  enabled: false

remoteActionEvaluatorHeadless:
  enabled: false

blockIntervalNotifier:
  enabled: false

rudolfService:
  enabled: false

rudolfCurrencyNotifier:
  enabled: false

acc:
  enabled: false
  redis:
    enabled: false

fullState:
  enabled: false

jwtHeadless:
  enabled: false

lib9cStateService:
  enabled: false

dataProviderDataMigrator:
  enabled: false

# Snapshot CronJob is the only workload on pt6.
snapshot:
  slackChannel: "9c-mainnet"
  sourceLabel: "pt6"
  path: "main/partition"

  fullSnapshot:
    enabled: false
    suspend: false

  partitionReset:
    enabled: false
    suspend: false

  # Daily preload-only run (Mon-Sat) keeps RocksDB current without uploading,
  # so Sunday's full job's catchup phase stays minutes instead of hours.
  preload:
    enabled: true
    schedule: "0 0 * * 1-6"
    suspend: false

  partition:
    enabled: true
    # Weekly full snapshot (Sunday 00:00 UTC). Cuts R2/S3 storage cost by ~7×
    # versus daily, while the daily preload above keeps the chain warm.
    schedule: "0 0 * * 0"
    suspend: false
    zstd: false
    # Hybrid layout: RocksDB chain on SSD (fast random I/O), snapshot zip on HDD
    # (large sequential writes, preserves SSD life). Both PVCs pre-created
    # manually on pt6 (see plan file Phase 2e).
    volumeMode: hybrid
    chainDataVolume:
      name: snapshot-chain-data-pt6
    outputVolume:
      name: snapshot-output-pt6
    volume:
      create: false
      name: snapshot-partition-pt6  # unused in hybrid mode
    dp:
      enabled: false

  resources:
    requests:
      cpu: "4"
      memory: 20Gi
    limits:
      memory: 24Gi

  uploadResources:
    requests:
      cpu: "1"
      memory: 4Gi
    limits:
      memory: 6Gi

  # Override 9c-main inherited selector (baremetal-1) to target pt6's label.
  # pt6 RKE2 node-label config must set node-index=6 and type=baremetal.
  nodeSelector:
    node.kubernetes.io/type: baremetal
    node.kubernetes.io/node-index: "6"

volumeReclaimPolicy: "Retain"

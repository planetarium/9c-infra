{{- if .Values.libplanetConsole.enabled }}
apiVersion: v1
kind: Service
metadata:
  name: libplanet-console
  namespace: holesky-testnet
  labels:
    app.kubernetes.io/instance: holesky-testnet
  annotations:
    service.beta.kubernetes.io/aws-load-balancer-scheme: internet-facing
    service.beta.kubernetes.io/aws-load-balancer-type: external
  finalizers:
    - service.k8s.aws/resources
spec:
  ports:
    - name: libplanet-console
      protocol: TCP
      port: 5001
      targetPort: 5001
    - name: libplanet-rollup-poc
      protocol: TCP
      port: 80
      targetPort: 3000
  selector:
    app: libplanet-console
  type: LoadBalancer
  sessionAffinity: None
  externalTrafficPolicy: Cluster
  ipFamilies:
    - IPv4
  ipFamilyPolicy: SingleStack
  allocateLoadBalancerNodePorts: true
  loadBalancerClass: service.k8s.aws/nlb
  internalTrafficPolicy: Cluster

---

apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: libplanet-console
  namespace: holesky-testnet
  labels:
    app: libplanet-console
spec:
  replicas: 1
  selector:
    matchLabels:
      app: libplanet-console
  template:
    metadata:
      labels:
        app: libplanet-console
    spec:
      volumes:
        - name: libplanet-console-volume
          persistentVolumeClaim:
            claimName: libplanet-console-volume
      containers:
        - name: libplanet-console
          image: kangseokhun43/libplanet-console:latest
          ports:
            - name: console
              containerPort: 5001
              protocol: TCP
          resources:
            requests:
              memory: 4Gi
          volumeMounts:
            - name: libplanet-console-volume
              mountPath: /data
          terminationMessagePath: /dev/termination-log
          terminationMessagePolicy: File
          imagePullPolicy: IfNotPresent
        - name: libplanet-rollup-poc
          image: kangseokhun43/libplanet-rollup-poc:latest
          ports:
            - name: rollup-poc
              containerPort: 3000
              protocol: TCP
          terminationMessagePath: /dev/termination-log
          terminationMessagePolicy: File
          imagePullPolicy: IfNotPresent
      restartPolicy: Always
      terminationGracePeriodSeconds: 30
      dnsPolicy: ClusterFirst
      nodeSelector:
        eks.amazonaws.com/nodegroup: mothership-use2-m7g_large_2c
      securityContext: {}
      schedulerName: default-scheduler
  volumeClaimTemplates:
    - kind: PersistentVolumeClaim
      apiVersion: v1
      metadata:
        name: libplanet-console-volume
      spec:
        accessModes:
          - ReadWriteOnce
        resources:
          requests:
            storage: 1Gi
        storageClassName: gp3-extensible
        volumeMode: Filesystem
{{- end }}

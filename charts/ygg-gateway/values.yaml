externalSecretKey: ""

image:
  repository: planetariumhq/ragnarok-breaker-ygg-gateway
  tag: develop
  pullPolicy: IfNotPresent

imagePullSecret:
  name: ygg-gateway-regcred
  secretKey: ""

service:
  port: 8787

deployment:
  replicas: 1
  port: 8787
  resources:
    requests:
      cpu: 50m
      memory: 128Mi
    limits:
      cpu: 500m
      memory: 512Mi
  livenessProbe:
    httpGet:
      path: /healthz
      port: 8787
    initialDelaySeconds: 30
    periodSeconds: 15
    failureThreshold: 3
  readinessProbe:
    httpGet:
      path: /healthz
      port: 8787
    initialDelaySeconds: 10
    periodSeconds: 10
    failureThreshold: 3

httpRoute:
  enabled: false
  hostnames: []
  gatewayName: traefik-gateway
  gatewayNamespace: traefik

nodeSelector: {}

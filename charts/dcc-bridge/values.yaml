# Override these in 9c-main/dcc-bridge/values.yaml.
externalSecretKey: ""

serviceAccount:
  # IAM Role used by both api and bridge for KMS Sign (via IRSA).
  roleArn: ""

api:
  enabled: false
  image:
    repository: planetariumhq/dcc-bridge
    tag: ""
  replicas: 1
  hostnames: []
  resources:
    requests:
      cpu: 100m
      memory: 256Mi
    limits:
      cpu: 500m
      memory: 1Gi
  nodeSelector: {}

  cronStatus:
    # Replaces the EventBridge rule `dcc-bridge-lambda-event-rule`
    # (cron(0/1 * * * ? *) on AWS = every minute UTC)
    enabled: false
    schedule: "* * * * *"
  cronReport:
    # Replaces the EventBridge rule `dcc-bridge-lambda-report-event-rule`
    # (cron(30 1 * * ? *) on AWS = daily 01:30 UTC)
    enabled: false
    schedule: "30 1 * * *"

bridge:
  enabled: false
  image:
    repository: planetariumhq/dcc-bridge
    tag: ""
  resources:
    requests:
      cpu: 100m
      memory: 256Mi
    limits:
      cpu: 500m
      memory: 1Gi
  nodeSelector: {}

  cronRetry:
    # Periodic retry of nc_transfer rows where EventObserver started but
    # failed before staging the 9c TransferAsset (tx_status / tx_hash NULL).
    # Re-runs the same KMS+stage path the worker uses, then sweeps fetch_log.
    enabled: false
    # 30 min cadence keeps incomplete_block_count from staying nonzero for
    # long enough that the /status check flips to UNSTABLE.
    schedule: "*/30 * * * *"

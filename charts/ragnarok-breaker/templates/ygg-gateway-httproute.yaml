{{- if and .Values.yggGateway.enabled .Values.yggGateway.httpRoute.enabled .Values.yggGateway.httpRoute.hostnames }}
apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: ygg-gateway
  namespace: {{ .Release.Namespace }}
  labels:
    app: ygg-gateway
    app.kubernetes.io/instance: {{ .Release.Name }}
    app.kubernetes.io/component: ygg-gateway
spec:
  parentRefs:
    - name: {{ .Values.yggGateway.httpRoute.gatewayName }}
      namespace: {{ .Values.yggGateway.httpRoute.gatewayNamespace }}
      sectionName: web
    - name: {{ .Values.yggGateway.httpRoute.gatewayName }}
      namespace: {{ .Values.yggGateway.httpRoute.gatewayNamespace }}
      sectionName: websecure
  hostnames:
    {{- range .Values.yggGateway.httpRoute.hostnames }}
    - {{ . | quote }}
    {{- end }}
  rules:
    - matches:
        - path:
            type: PathPrefix
            value: /
      backendRefs:
        - name: ygg-gateway
          port: {{ .Values.yggGateway.service.port }}
{{- end }}

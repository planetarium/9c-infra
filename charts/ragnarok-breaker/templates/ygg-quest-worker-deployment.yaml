{{- if .Values.yggQuestWorker.enabled }}
apiVersion: apps/v1
kind: Deployment
metadata:
  name: ygg-quest-worker
  namespace: {{ .Release.Namespace }}
  labels:
    app: ygg-quest-worker
    app.kubernetes.io/instance: {{ .Release.Name }}
    app.kubernetes.io/component: ygg-quest-worker
spec:
  replicas: {{ .Values.yggQuestWorker.replicas }}
  selector:
    matchLabels:
      app: ygg-quest-worker
  template:
    metadata:
      labels:
        app: ygg-quest-worker
    spec:
      {{- if .Values.imagePullSecret.secretKey }}
      imagePullSecrets:
        - name: {{ .Values.imagePullSecret.name }}
      {{- end }}
      {{- if and .Values.v8Gateway.enabled .Values.v8Gateway.waitForReady }}
      initContainers:
        - name: wait-for-v8-gateway
          image: busybox:1.36
          command:
            - sh
            - -c
            - |
              until wget -q -O /dev/null {{ .Values.v8Gateway.serviceUrl }}/health; do
                echo "waiting for v8-gateway..."
                sleep 2
              done
      {{- end }}
      containers:
        - name: ygg-quest-worker
          image: "{{ .Values.yggQuestWorker.image.repository }}:{{ .Values.yggQuestWorker.image.tag }}"
          imagePullPolicy: {{ .Values.yggQuestWorker.image.pullPolicy }}
          env:
            - name: V8_GATEWAY_URL
              value: {{ .Values.v8Gateway.serviceUrl | quote }}
          envFrom:
            - secretRef:
                name: ragnarok-breaker-env
          resources:
            {{- toYaml .Values.yggQuestWorker.resources | nindent 12 }}
      {{- with .Values.nodeSelector }}
      nodeSelector:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      restartPolicy: Always
{{- end }}

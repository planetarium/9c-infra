externalSecretKey: ""

image:
  repository: planetariumhq/ragnarok-breaker-worker
  tag: develop
  pullPolicy: IfNotPresent

imagePullSecret:
  name: ragnarok-breaker-regcred
  secretKey: ""

# Single-instance HTTP proxy that owns the V8 GameServer connection.
# NEVER scale beyond 1 — duplicate connections cause V8 to kick both with 4009.
gsGateway:
  enabled: true
  replicas: 1
  command: ["bun", "run", "worker/src/entry/gs-gateway.entry.ts"]
  host: "0.0.0.0"
  port: 3000
  serviceUrl: "http://gs-gateway:3000"
  waitForReady: true
  resources:
    requests:
      cpu: 50m
      memory: 128Mi
    limits:
      cpu: 500m
      memory: 512Mi
  livenessProbe:
    httpGet:
      path: /health
      port: 3000
    initialDelaySeconds: 30
    periodSeconds: 15
    failureThreshold: 3
  readinessProbe:
    httpGet:
      path: /health
      port: 3000
    initialDelaySeconds: 10
    periodSeconds: 10
    failureThreshold: 3

workers:
  scheduler:
    enabled: true
    replicas: 1
    command: ["bun", "run", "worker/src/entry/scheduler.entry.ts"]
    resources:
      requests:
        cpu: 100m
        memory: 256Mi
      limits:
        cpu: 500m
        memory: 512Mi
  gameValidator:
    enabled: true
    replicas: 1
    command: ["bun", "run", "worker/src/entry/game-worker.entry.ts"]
    resources:
      requests:
        cpu: 200m
        memory: 512Mi
      limits:
        cpu: "1"
        memory: 1Gi
  gameplayValidator:
    enabled: true
    replicas: 1
    command: ["bun", "run", "worker/src/entry/gameplay-worker.entry.ts"]
    resources:
      requests:
        cpu: 200m
        memory: 512Mi
      limits:
        cpu: "1"
        memory: 1Gi
  summonValidator:
    enabled: true
    replicas: 1
    command: ["bun", "run", "worker/src/entry/summon-worker.entry.ts"]
    resources:
      requests:
        cpu: 200m
        memory: 512Mi
      limits:
        cpu: "1"
        memory: 1Gi
  leagueSnapshot:
    enabled: true
    replicas: 1
    command: ["bun", "run", "worker/src/entry/league-worker.entry.ts"]
    resources:
      requests:
        cpu: 200m
        memory: 512Mi
      limits:
        cpu: "1"
        memory: 1Gi

# Yggdrasil redemption gateway (Bun/Hono HTTP service from JiwonRB workspace).
# Stateless, separate Docker image, exposed externally via Gateway API HTTPRoute.
# Reuses the chart's SecretStore + imagePullSecret; needs its own externalSecretKey
# because the env vars (YGG_*, V8_*, AGENT8_*) don't overlap with the worker secret.
yggGateway:
  enabled: false
  externalSecretKey: ""
  image:
    repository: planetariumhq/ragnarok-breaker-ygg-gateway
    tag: develop
    pullPolicy: IfNotPresent
  service:
    port: 8787
  deployment:
    replicas: 1
    port: 8787
    resources:
      requests:
        cpu: 50m
        memory: 128Mi
      limits:
        cpu: 500m
        memory: 512Mi
    livenessProbe:
      httpGet:
        path: /healthz
        port: 8787
      initialDelaySeconds: 30
      periodSeconds: 15
      failureThreshold: 3
    readinessProbe:
      httpGet:
        path: /healthz
        port: 8787
      initialDelaySeconds: 10
      periodSeconds: 10
      failureThreshold: 3
  httpRoute:
    enabled: false
    hostnames: []
    gatewayName: traefik-gateway
    gatewayNamespace: traefik

nodeSelector: {}

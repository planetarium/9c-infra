externalSecretKey: ""

imagePullSecret:
  name: ragnarok-breaker-regcred
  secretKey: ""

# === Worker: single image, 2 entry points ===
worker:
  image:
    repository: planetariumhq/ragnarok-breaker-worker
    tag: develop
    pullPolicy: IfNotPresent

# Anti-cheat validation is polling-based (upstream refactor): each worker runs
# its own BullMQ repeatable scheduler and sweeps the V8 game-history collection
# for `validated == false` rows, runs gameplay validation, and writes the
# result back via admin.markRecordValidated (collection update + autoban +
# slack). The old log-stream trigger path and the seed/gameplay trigger workers
# were removed upstream; their entry files no longer exist in the image. Both
# workers reach V8 only through v8-gateway and share Redis (REDIS_URL).
#   - stageValidation : STAGE + VALHALLA sweep, every STAGE_VALIDATION_INTERVAL_MS  (default 30s)
#   - leagueValidation: LEAGUE finalize + snapshot, every LEAGUE_VALIDATION_INTERVAL_MS (default 1h)
workers:
  stageValidation:
    enabled: true
    replicas: 1
    command: ["bun", "run", "services/worker/src/entry/stage-validation-worker.entry.ts"]
    resources:
      requests:
        cpu: 200m
        memory: 512Mi
      limits:
        cpu: "1"
        memory: 1Gi
  leagueValidation:
    enabled: true
    replicas: 1
    command: ["bun", "run", "services/worker/src/entry/league-validation-worker.entry.ts"]
    resources:
      requests:
        cpu: 200m
        memory: 512Mi
      limits:
        cpu: "1"
        memory: 1Gi

# === V8 GameServer HTTP proxy ===
# Single-instance HTTP proxy that owns the V8 GameServer connection.
# NEVER scale beyond 1 — duplicate connections cause V8 to kick both with 4009.
v8Gateway:
  enabled: true
  image:
    repository: planetariumhq/ragnarok-breaker-v8-gateway
    tag: develop
    pullPolicy: IfNotPresent
  replicas: 1
  host: "0.0.0.0"
  port: 3000
  serviceUrl: "http://v8-gateway:3000"
  waitForReady: true
  resources:
    requests:
      cpu: 50m
      memory: 128Mi
    limits:
      cpu: 500m
      memory: 512Mi
  livenessProbe:
    httpGet:
      path: /health
      port: 3000
    initialDelaySeconds: 30
    periodSeconds: 15
    failureThreshold: 3
  readinessProbe:
    httpGet:
      path: /health
      port: 3000
    initialDelaySeconds: 10
    periodSeconds: 10
    failureThreshold: 3

# === Yggdrasil redemption (Bun/Hono HTTP) ===
# Stateless; can scale horizontally. Exposed externally via Gateway API HTTPRoute.
yggRedeem:
  enabled: true
  image:
    repository: planetariumhq/ragnarok-breaker-ygg-redeem
    tag: develop
    pullPolicy: IfNotPresent
  service:
    port: 8787
  deployment:
    replicas: 1
    port: 8787
    resources:
      requests:
        cpu: 50m
        memory: 128Mi
      limits:
        cpu: 500m
        memory: 512Mi
    livenessProbe:
      httpGet:
        path: /healthz
        port: 8787
      initialDelaySeconds: 30
      periodSeconds: 15
      failureThreshold: 3
    readinessProbe:
      httpGet:
        path: /healthz
        port: 8787
      initialDelaySeconds: 10
      periodSeconds: 10
      failureThreshold: 3
  httpRoute:
    enabled: false
    hostnames: []
    gatewayName: traefik-gateway
    gatewayNamespace: traefik

# === V8 SSE log subscriber → BullMQ enqueuer ===
# Single instance: cursor in Redis, multi-instance would dispatch duplicates.
logStream:
  enabled: true
  image:
    repository: planetariumhq/ragnarok-breaker-log-stream
    tag: develop
    pullPolicy: IfNotPresent
  replicas: 1
  resources:
    requests:
      cpu: 50m
      memory: 128Mi
    limits:
      cpu: 500m
      memory: 256Mi

# === BullMQ consumer for playfull-event queue → Playfull Events API ===
# log-stream 이 LOG_STREAM_ENABLE_PLAYFULL=true 일 때만 playfull-event 큐에 잡을 넣는다.
# 워커는 V8 의존이 없다 — 잡을 받아 HMAC 서명 후 Playfull 로 POST 할 뿐.
# 크리덴셜(PLAYFULL_CLIENT_ID/_CLIENT_SECRET/_GAME_ID)과 PLAYFULL_DRY_RUN 은
# ragnarok-breaker-env ExternalSecret(AWS SM) 에서 주입한다.
# PLAYFULL_DRY_RUN 미설정 시 기본 true(전송 안 함) — 안전한 기본값.
playfullWorker:
  enabled: false
  image:
    repository: planetariumhq/ragnarok-breaker-playfull-worker
    tag: develop
    pullPolicy: IfNotPresent
  replicas: 1
  resources:
    requests:
      cpu: 50m
      memory: 128Mi
    limits:
      cpu: 500m
      memory: 256Mi

# === BullMQ consumer for bq-analytics-events queue → BigQuery insertAll ===
# Consumes bq_event jobs enqueued by log-stream and writes rows to BigQuery.
# Independent of V8 gateway. GCP auth via BQ_SERVICE_ACCOUNT_JSON_BASE64
# (set in the ragnarok-breaker-env ExternalSecret).
bqAnalyticsWorker:
  enabled: true
  image:
    repository: planetariumhq/ragnarok-breaker-bq-analytics-worker
    tag: develop
    pullPolicy: IfNotPresent
  replicas: 1
  resources:
    requests:
      cpu: 100m
      memory: 256Mi
    limits:
      cpu: 500m
      memory: 512Mi

# === Anti-cheat alert worker → Slack ===
# BullMQ consumer for the anticheat-alert queue (prefix `aca`). The server emits
# anticheat_alert log events; log-stream routes them onto the queue; this worker
# consumes them and POSTs to Slack. Per-env consumer (own Redis), so enabled in
# each prod overlay (default off here). Reads from the ragnarok-breaker-env
# ExternalSecret: REDIS_URL (required), SLACK_VIOLATION_WEBHOOK_URL (optional —
# unset → notifications silently skipped), WORKER_CONCURRENCY (optional, dflt 5).
anticheatAlertWorker:
  enabled: false
  image:
    repository: planetariumhq/ragnarok-breaker-anticheat-alert-worker
    tag: develop
    pullPolicy: IfNotPresent
  replicas: 1
  resources:
    requests:
      cpu: 100m
      memory: 256Mi
    limits:
      cpu: 500m
      memory: 512Mi

# === Mail payout worker (BullMQ mail-send consumer + HTTP /enqueue) ===
# recipient 1인 = job 1개 소비 → 전용 mail-sender V8 세션으로 sendMailIdempotent 호출.
# HTTP /enqueue 는 운영자 mail.send 토큰 검증 후 job 투입. 기본 off — env 별 override 에서 enable.
# 다른 워커(services/worker, BullMQ prefix 'worker')와 같은 Redis DB(REDIS_URL)를 공유하되
# prefix 'mail-send' 로 키 공간 분리. 필요 env(ragnarok-breaker-env AWS SM): MAIL_SENDER_V8_ACCOUNT,
# MAIL_SENDER_V8_VERSE, MAIL_SENDER_V8_ENV, MAIL_SENDER_V8_AUTH[, MAIL_SENDER_V8_REMOTE_URL],
# MAIL_SEND_SLACK_WEBHOOK, MAIL_SEND_LIMITER_MAX, MAIL_SEND_LIMITER_MS, REDIS_URL.
mailSendWorker:
  enabled: false
  image:
    repository: planetariumhq/ragnarok-breaker-mail-send-worker
    tag: develop
    pullPolicy: IfNotPresent
  service:
    port: 3100
  deployment:
    replicas: 1
    port: 3100
    resources:
      requests:
        cpu: 50m
        memory: 128Mi
      limits:
        cpu: 500m
        memory: 512Mi
  httpRoute:
    enabled: false
    hostnames: []
    gatewayName: traefik-gateway
    gatewayNamespace: traefik

# === League reward mail worker (리그 시즌 종료 → 보상 메일 자동 발송) ===
# 폴링(기본 1h): R2 리그 시즌 종료 감지 → admin.getSeasonValidationStatus 로 모든 랭킹
# 로우 validated 확인 → 보상 계산 → mailSendWorker /preview → 10분 뒤 /confirm 자동 확정.
# mailSendWorker 를 같은 네임스페이스 내부 DNS(http://mail-send-worker:3100)로 호출하므로
# 이 워커를 켜는 env 에는 mailSendWorker 도 함께 켜져 있어야 한다. 이중지급 방지 권위는
# 결정론적 jobId(league-s{seasonId}-{verseLabel}) + 서버 receipt — redis 유실에도 안전.
# 필요 env(ragnarok-breaker-env AWS SM): R2_PUBLIC_BASE, CDN_ENV, MAIL_SENDER_V8_*/V8_*
#   (계정은 worker.records·user.read·mail.send 권한 필요), REDIS_URL.
# 선택 튜닝 env: LEAGUE_REWARD_POLL_INTERVAL_MS, LEAGUE_REWARD_GRACE_MS,
#   LEAGUE_REWARD_LOOKBACK_MS, LEAGUE_REWARD_CONFIRM_DELAY_MS, LEAGUE_REWARD_TTL_DAYS,
#   LEAGUE_PASS_RUBY_MULT, LEAGUE_REWARD_ENTITLEMENT_INTERVAL_MS.
# 기본 off — env 별 override 에서 enable + verseLabel 지정 + 이미지 태그 pin.
leagueRewardWorker:
  enabled: false
  image:
    repository: planetariumhq/ragnarok-breaker-league-reward-worker
    tag: develop
    pullPolicy: IfNotPresent
  deployment:
    replicas: 1
    port: 3200
    resources:
      requests:
        cpu: 50m
        memory: 128Mi
      limits:
        cpu: 500m
        memory: 512Mi
  config:
    # 같은 네임스페이스 mail-send-worker ClusterIP Service.
    mailSendWorkerUrl: http://mail-send-worker:3100
    # jobId suffix. env 별 override 에서 반드시 고유값 지정(예 staging-w2 / staging-w3).
    verseLabel: ""

# === External payment backend → BigQuery analytics ingest gateway ===
# Thin HTTP gateway (Bun.serve): POST /v1/events (Bearer auth) validates the
# envelope and enqueues a bq_event job onto the bq-analytics-events BullMQ
# queue consumed by bqAnalyticsWorker. Stateless; exposed externally via
# Gateway API HTTPRoute so the V8 payment backend can push events.
# Single shared instance: every payment env hits one endpoint (no app_env
# split), so it is deployed ONLY in prod-web3 (default off, enabled there).
# Required env (from the ragnarok-breaker-env ExternalSecret): INGEST_ADMIN_TOKEN,
# BQ_ANALYTICS_REDIS_URL.
bqIngestGateway:
  enabled: false
  image:
    repository: planetariumhq/ragnarok-breaker-bq-ingest-gateway
    tag: develop
    pullPolicy: IfNotPresent
  service:
    port: 8080
  deployment:
    replicas: 1
    port: 8080
    resources:
      requests:
        cpu: 50m
        memory: 128Mi
      limits:
        cpu: 500m
        memory: 256Mi
    livenessProbe:
      httpGet:
        path: /healthz
        port: 8080
      initialDelaySeconds: 30
      periodSeconds: 15
      failureThreshold: 3
    readinessProbe:
      httpGet:
        path: /healthz
        port: 8080
      initialDelaySeconds: 10
      periodSeconds: 10
      failureThreshold: 3
  httpRoute:
    enabled: false
    hostnames: []
    gatewayName: traefik-gateway
    gatewayNamespace: traefik

nodeSelector: {}

# === Analytics snapshot CronJob (12h) — meme-api/V8/GA → R2 + viewer bake/deploy ===
# w2/w3 를 한 런에서 모두 수집하는 전역 싱글톤. ragnarok-breaker-prod 오버라이드에서만 enable.
analyticsWorker:
  enabled: false
  schedule: "0 */12 * * *"
  image:
    repository: planetariumhq/ragnarok-breaker-analytics-worker
    tag: develop
    pullPolicy: IfNotPresent
  resources:
    requests:
      cpu: 100m
      memory: 256Mi
    limits:
      cpu: 500m
      memory: 512Mi

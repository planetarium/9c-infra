externalSecretKey: ""

imagePullSecret:
  name: ragnarok-breaker-regcred
  secretKey: ""

# === Worker: single image, 5 entry points ===
worker:
  image:
    repository: planetariumhq/ragnarok-breaker-worker
    tag: develop
    pullPolicy: IfNotPresent

workers:
  scheduler:
    enabled: true
    replicas: 1
    command: ["bun", "run", "services/worker/src/entry/scheduler.entry.ts"]
    resources:
      requests:
        cpu: 100m
        memory: 256Mi
      limits:
        cpu: 500m
        memory: 512Mi
  gameValidator:
    enabled: true
    replicas: 1
    command: ["bun", "run", "services/worker/src/entry/game-worker.entry.ts"]
    resources:
      requests:
        cpu: 200m
        memory: 512Mi
      limits:
        cpu: "1"
        memory: 1Gi
  gameplayValidator:
    enabled: true
    replicas: 1
    command: ["bun", "run", "services/worker/src/entry/gameplay-worker.entry.ts"]
    resources:
      requests:
        cpu: 200m
        memory: 512Mi
      limits:
        cpu: "1"
        memory: 1Gi
  summonValidator:
    enabled: true
    replicas: 1
    command: ["bun", "run", "services/worker/src/entry/summon-worker.entry.ts"]
    resources:
      requests:
        cpu: 200m
        memory: 512Mi
      limits:
        cpu: "1"
        memory: 1Gi
  leagueSnapshot:
    enabled: true
    replicas: 1
    command: ["bun", "run", "services/worker/src/entry/league-worker.entry.ts"]
    resources:
      requests:
        cpu: 200m
        memory: 512Mi
      limits:
        cpu: "1"
        memory: 1Gi

# === V8 GameServer HTTP proxy ===
# Single-instance HTTP proxy that owns the V8 GameServer connection.
# NEVER scale beyond 1 — duplicate connections cause V8 to kick both with 4009.
v8Gateway:
  enabled: true
  image:
    repository: planetariumhq/ragnarok-breaker-v8-gateway
    tag: develop
    pullPolicy: IfNotPresent
  replicas: 1
  host: "0.0.0.0"
  port: 3000
  serviceUrl: "http://v8-gateway:3000"
  waitForReady: true
  resources:
    requests:
      cpu: 50m
      memory: 128Mi
    limits:
      cpu: 500m
      memory: 512Mi
  livenessProbe:
    httpGet:
      path: /health
      port: 3000
    initialDelaySeconds: 30
    periodSeconds: 15
    failureThreshold: 3
  readinessProbe:
    httpGet:
      path: /health
      port: 3000
    initialDelaySeconds: 10
    periodSeconds: 10
    failureThreshold: 3

# === Yggdrasil redemption (Bun/Hono HTTP) ===
# Stateless; can scale horizontally. Exposed externally via Gateway API HTTPRoute.
yggRedeem:
  enabled: true
  image:
    repository: planetariumhq/ragnarok-breaker-ygg-redeem
    tag: develop
    pullPolicy: IfNotPresent
  service:
    port: 8787
  deployment:
    replicas: 1
    port: 8787
    resources:
      requests:
        cpu: 50m
        memory: 128Mi
      limits:
        cpu: 500m
        memory: 512Mi
    livenessProbe:
      httpGet:
        path: /healthz
        port: 8787
      initialDelaySeconds: 30
      periodSeconds: 15
      failureThreshold: 3
    readinessProbe:
      httpGet:
        path: /healthz
        port: 8787
      initialDelaySeconds: 10
      periodSeconds: 10
      failureThreshold: 3
  httpRoute:
    enabled: false
    hostnames: []
    gatewayName: traefik-gateway
    gatewayNamespace: traefik

# === V8 SSE log subscriber → BullMQ enqueuer ===
# Single instance: cursor in Redis, multi-instance would dispatch duplicates.
logStream:
  enabled: true
  image:
    repository: planetariumhq/ragnarok-breaker-log-stream
    tag: develop
    pullPolicy: IfNotPresent
  replicas: 1
  resources:
    requests:
      cpu: 50m
      memory: 128Mi
    limits:
      cpu: 500m
      memory: 256Mi

# === BullMQ consumer for ygg-quest-trigger queue ===
yggQuestWorker:
  enabled: true
  image:
    repository: planetariumhq/ragnarok-breaker-ygg-quest-worker
    tag: develop
    pullPolicy: IfNotPresent
  replicas: 1
  resources:
    requests:
      cpu: 100m
      memory: 256Mi
    limits:
      cpu: 500m
      memory: 512Mi

# === BullMQ consumer for bq-analytics-events queue → BigQuery insertAll ===
# Consumes bq_event jobs enqueued by log-stream and writes rows to BigQuery.
# Independent of V8 gateway. GCP auth via BQ_SERVICE_ACCOUNT_JSON_BASE64
# (set in the ragnarok-breaker-env ExternalSecret).
bqAnalyticsWorker:
  enabled: true
  image:
    repository: planetariumhq/ragnarok-breaker-bq-analytics-worker
    tag: develop
    pullPolicy: IfNotPresent
  replicas: 1
  resources:
    requests:
      cpu: 100m
      memory: 256Mi
    limits:
      cpu: 500m
      memory: 512Mi

nodeSelector: {}

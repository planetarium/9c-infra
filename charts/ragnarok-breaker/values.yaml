externalSecretKey: ""

image:
  repository: planetariumhq/ragnarok-breaker-worker
  tag: develop
  pullPolicy: IfNotPresent

imagePullSecret:
  name: ragnarok-breaker-regcred
  secretKey: ""

# Single-instance HTTP proxy that owns the V8 GameServer connection.
# NEVER scale beyond 1 — duplicate connections cause V8 to kick both with 4009.
gsGateway:
  enabled: true
  replicas: 1
  command: ["bun", "run", "worker/src/entry/gs-gateway.entry.ts"]
  host: "0.0.0.0"
  port: 3000
  serviceUrl: "http://gs-gateway:3000"
  waitForReady: true
  resources:
    requests:
      cpu: 50m
      memory: 128Mi
    limits:
      cpu: 500m
      memory: 512Mi
  livenessProbe:
    httpGet:
      path: /health
      port: 3000
    initialDelaySeconds: 30
    periodSeconds: 15
    failureThreshold: 3
  readinessProbe:
    httpGet:
      path: /health
      port: 3000
    initialDelaySeconds: 10
    periodSeconds: 10
    failureThreshold: 3

workers:
  scheduler:
    enabled: true
    replicas: 1
    command: ["bun", "run", "worker/src/entry/scheduler.entry.ts"]
    resources:
      requests:
        cpu: 100m
        memory: 256Mi
      limits:
        cpu: 500m
        memory: 512Mi
  gameValidator:
    enabled: true
    replicas: 1
    command: ["bun", "run", "worker/src/entry/game-worker.entry.ts"]
    resources:
      requests:
        cpu: 200m
        memory: 512Mi
      limits:
        cpu: "1"
        memory: 1Gi
  gameplayValidator:
    enabled: true
    replicas: 1
    command: ["bun", "run", "worker/src/entry/gameplay-worker.entry.ts"]
    resources:
      requests:
        cpu: 200m
        memory: 512Mi
      limits:
        cpu: "1"
        memory: 1Gi
  summonValidator:
    enabled: true
    replicas: 1
    command: ["bun", "run", "worker/src/entry/summon-worker.entry.ts"]
    resources:
      requests:
        cpu: 200m
        memory: 512Mi
      limits:
        cpu: "1"
        memory: 1Gi
  leagueSnapshot:
    enabled: true
    replicas: 1
    command: ["bun", "run", "worker/src/entry/league-worker.entry.ts"]
    resources:
      requests:
        cpu: 200m
        memory: 512Mi
      limits:
        cpu: "1"
        memory: 1Gi

nodeSelector: {}
